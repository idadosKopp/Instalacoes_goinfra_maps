<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Instalações Goinfra - Monitoramento de Faixas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

:root{
--bg-body:#f0f2f5;
--sidebar-bg:#ffffff;
--text-main:#2d3436;
--color-rota-1:#045a28;
--color-rota-2:#d49204;
--color-rota-3:#1509bd;
}

body{
margin:0;
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
display:flex;
height:100vh;
background-color:var(--bg-body);
color:var(--text-main);
}

/* ===== TELA DE LOGIN ===== */
#login-overlay{
position:fixed;
inset:0;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;

background-image:url("INSTALADAS_GOINFRA.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.login-box{
background:#ffffff;
padding:40px 36px 32px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
width:340px;
text-align:center;
}

.login-box h2{
margin:0 0 6px;
font-size:1.3rem;
color:#2d3436;
}

.login-box p{
margin:0 0 24px;
font-size:12px;
color:#7f8c8d;
}

.login-box input[type="password"]{
width:100%;
padding:12px 14px;
border:2px solid #dfe6e9;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
outline:none;
transition:border-color .2s;
}

.login-box input[type="password"]:focus{
border-color:#0f3460;
}

.login-box .btn-login{
width:100%;
margin-top:14px;
padding:12px;
border:none;
border-radius:8px;
background:#0f3460;
color:#fff;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:background .2s;
}

.login-box .btn-login:hover{
background:#1a4a7a;
}

.login-erro{
color:#d63031;
font-size:12px;
margin-top:10px;
min-height:18px;
}

/* ===== CONTEÚDO PRINCIPAL (oculto até login) ===== */
#app{
display:none;
width:100%;
height:100vh;
}

#sidebar{
width:380px;
background:var(--sidebar-bg);
padding:20px;
overflow-y:auto;
border-right:1px solid #d1d8e0;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
z-index:10;
}

#map{
flex:1;
}

.header-sidebar{
margin-bottom:20px;
padding-bottom:15px;
border-bottom:2px solid #f1f2f6;
}

.btn-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:25px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:11px;
text-transform:uppercase;
}

.btn-all{background:#2f3640;color:white;grid-column:span 2;}
.btn1{background:var(--color-rota-1);color:white;}
.btn2{background:var(--color-rota-2);color:white;}
.btn3{background:var(--color-rota-3);color:white;}

.card-viagem{
background:#fff;
margin-bottom:12px;
padding:15px;
border-radius:10px;
border:1px solid #e1e8ed;
border-left:6px solid #ccc;
}

.rota-1{border-left-color:var(--color-rota-1);}
.rota-2{border-left-color:var(--color-rota-2);}
.rota-3{border-left-color:var(--color-rota-3);}

.tag-faixas{
display:inline-block;
margin-top:8px;
background:#f1f2f6;
padding:4px 10px;
border-radius:20px;
font-weight:bold;
font-size:12px;
}

</style>
</head>

<body>

<!-- ===== TELA DE LOGIN ===== -->
<div id="login-overlay">
  <div class="login-box">

  <img src="50 anos sem frase_Menor.png" style="width:200px;margin-bottom:10px;">

  <p>Monitoramento de Rotas Goinfra</p>
  
    <input type="password" id="inputSenha" placeholder="Digite a senha" autofocus
           onkeydown="if(event.key==='Enter') validarSenha()">
    <button class="btn-login" onclick="validarSenha()">Entrar</button>
    <div class="login-erro" id="loginErro"></div>
  </div>
</div>

<!-- ===== CONTEÚDO PRINCIPAL ===== -->
<div id="app">

  <div id="sidebar">
    <div class="header-sidebar">
      <h2 style="margin:0;font-size:1.4rem;">Instalações Goinfra</h2>
      <p style="font-size:12px;color:#7f8c8d;">Controle de Rotas e Faixas</p>
    </div>

    <div class="btn-group">
      <button class="btn-all" onclick="mostrarRota(0)">Ver Tudo</button>
      <button class="btn1" onclick="mostrarRota(1)">Rota 1</button>
      <button class="btn2" onclick="mostrarRota(2)">Rota 2</button>
      <button class="btn3" onclick="mostrarRota(3)">Rota 3</button>
    </div>

    <div id="lista"></div>
  </div>

  <div id="map"></div>

</div>

<script>

// =====================================================
// AUTENTICAÇÃO COM HASH SHA-256
// A senha NUNCA aparece em texto claro no código-fonte.
// Para gerar um novo hash, rode no console do navegador:
//   hashSenha("novaSenha").then(h => console.log(h))
// =====================================================

const HASH_CORRETO = "a584ba0fee587477162495574c8ad4e32c98c18787601826b3c6794c8f11fc68";

async function hashSenha(texto) {
  const encoder = new TextEncoder();
  const data = encoder.encode(texto);
  const buffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

async function validarSenha() {
  const input = document.getElementById("inputSenha");
  const erro  = document.getElementById("loginErro");
  const hash  = await hashSenha(input.value);

  if (hash === HASH_CORRETO) {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("app").style.display = "flex";
    init();
  } else {
    erro.textContent = "Senha incorreta. Tente novamente.";
    input.value = "";
    input.focus();
  }
}

// =====================================================
// MAPA E ROTAS (código original preservado)
// =====================================================

var mapa;
var linhas=[];
var marcadores=[];
var iconeCaminhao;

var inicio={cidade:"Goiânia",lat:-16.6864,lng:-49.2643,faixas:0};

var rotas={

  1:[
    inicio,
    {cidade:"Jaraguá",lat:-15.7561,lng:-49.3344,faixas:6},
    {cidade:"Carmo do Rio Verde",lat:-15.3539,lng:-49.7083,faixas:2},
    {cidade:"Ceres",lat:-15.3062,lng:-49.6003,faixas:2},
    {cidade:"Itapaci",lat:-14.9518,lng:-49.5513,faixas:10},
    {cidade:"Pilar de Goiás",lat:-14.7604,lng:-49.5797,faixas:2},
    {cidade:"Santa Terezinha de Goiás",lat:-14.4347,lng:-49.7094,faixas:4}
  ],

  2:[
    inicio,
    {cidade:"Porangatu",lat:-13.4393,lng:-49.1482,faixas:4},
    {cidade:"Novo Planalto",lat:-13.2424,lng:-49.5065,faixas:2},
    {cidade:"São Miguel do Araguaia",lat:-13.2750,lng:-50.1634,faixas:6},
    {cidade:"Mozarlândia",lat:-14.7448,lng:-50.5707,faixas:6},
    {cidade:"Crixás",lat:-14.5432,lng:-49.9696,faixas:3},
    {cidade:"Alto Horizonte",lat:-14.1957,lng:-49.3379,faixas:1}
  ],

  3:[
    inicio,
    {cidade:"Cidade de Goiás",lat:-15.9333,lng:-50.1403,faixas:2},
    {cidade:"Santa Fé de Goiás",lat:-15.7666,lng:-49.9261,faixas:6},
    {cidade:"Diorama",lat:-16.2314,lng:-51.2552,faixas:2},
    {cidade:"Arenópolis",lat:-16.3860,lng:-51.0906,faixas:3},
    {cidade:"Iporá",lat:-16.4411,lng:-51.1178,faixas:4},
    {cidade:"Caiapônia",lat:-16.9533,lng:-51.8101,faixas:2},
    {cidade:"Rio Verde",lat:-17.7923,lng:-50.9192,faixas:2},
    {cidade:"Montividiu",lat:-17.4435,lng:-51.1723,faixas:2},
    {cidade:"Perolândia",lat:-17.5259,lng:-52.0668,faixas:2},
    {cidade:"Mineiros",lat:-17.5656,lng:-52.5536,faixas:3},
    {cidade:"Chapadão do Céu",lat:-18.4074,lng:-52.5387,faixas:1},
    {cidade:"Itajá",lat:-19.0674,lng:-51.5498,faixas:2},
    {cidade:"São Simão",lat:-18.9968,lng:-50.5471,faixas:1}
  ]

};

function init(){

  iconeCaminhao = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/1048/1048329.png",
    iconSize: [30,30],
    iconAnchor: [15,30]
  });

  mapa=L.map('map').setView([-15.8,-50.5],7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
  }).addTo(mapa);

}

function calcularDistancia(a,b){

  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;

  const aa=
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(a.lat*Math.PI/180)*
    Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);

  return R*2*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));

}

function formatarTempo(km){
  const velocidadeMedia = 80;
  const ajusteEstrada = 1.7;

  const horasEstimadas = (km / velocidadeMedia) * ajusteEstrada;
  const minutos = Math.round(horasEstimadas * 60);

  const h = Math.floor(minutos / 60);
  const m = minutos % 60;

  return `${h}h ${m}min`;
}


function limpar(){
  linhas.forEach(l=>mapa.removeLayer(l));
  marcadores.forEach(m=>mapa.removeLayer(m));
  linhas=[];
  marcadores=[];
  document.getElementById("lista").innerHTML="";
}

function mostrarRota(n){

  limpar();

  const cores={1:"#045a28",2:"#d49204",3:"#1509bd"};

  for(let r in rotas){

    if(n!=0 && r!=n) continue;

    const cidades=rotas[r];

    cidades.forEach((c,i)=>{

      var marker=L.marker([c.lat,c.lng],{icon:iconeCaminhao})
        .addTo(mapa)
        .bindTooltip(c.cidade,{permanent:false,direction:"top"});

      marcadores.push(marker);

      if(i>0){

        const ant=cidades[i-1];
        const km=calcularDistancia(ant,c);
        const tempo = formatarTempo(km);

        const linha=L.polyline([
          [ant.lat,ant.lng],
          [c.lat,c.lng]
        ],{
          color:cores[r],
          weight:4
        }).addTo(mapa);

        linhas.push(linha);

        document.getElementById("lista").innerHTML+=`
          <div class="card-viagem rota-${r}">
            <b>${ant.cidade} ➔ ${c.cidade}</b><br>
            Distância: ${km.toFixed(1)} km<br>
            Tempo estimado: ${tempo}<br>
            <div class="tag-faixas">🛣️ ${c.faixas} faixas</div>
          </div>
        `;

      }

    });

  }

}

</script>

</body>
</html>
