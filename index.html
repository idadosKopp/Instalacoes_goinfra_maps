<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Instalações Goinfra - Monitoramento de Faixas</title>

<style>
:root{
--bg-body:#f0f2f5;
--sidebar-bg:#ffffff;
--text-main:#2d3436;
--color-rota-1:#045a28;
--color-rota-2:#d49204;
--color-rota-3:#1509bd;
}

body{
margin:0;
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
display:flex;
height:100vh;
background-color:var(--bg-body);
color:var(--text-main);
}

#sidebar{
width:380px;
background:var(--sidebar-bg);
padding:20px;
overflow-y:auto;
border-right:1px solid #d1d8e0;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
z-index:10;
}

#map{
flex:1;
}

.header-sidebar{
margin-bottom:20px;
padding-bottom:15px;
border-bottom:2px solid #f1f2f6;
}

.btn-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:25px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:11px;
text-transform:uppercase;
transition:all 0.2s ease;
}

.btn-all{background:#2f3640;color:white;grid-column:span 2;}
.btn1{background:var(--color-rota-1);color:white;}
.btn2{background:var(--color-rota-2);color:white;}
.btn3{background:var(--color-rota-3);color:white;}

button:hover{
opacity:0.9;
transform:translateY(-1px);
}

#resumo-rota{
background:#f8f9fa;
padding:12px;
border-radius:6px;
margin-bottom:15px;
font-size:13px;
border:1px dashed #ced4da;
display:none;
line-height:1.5;
}

.card-viagem{
background:#fff;
margin-bottom:12px;
padding:15px;
border-radius:10px;
border:1px solid #e1e8ed;
border-left:6px solid #ccc;
line-height:1.6;
}

.rota-1{border-left-color:var(--color-rota-1);}
.rota-2{border-left-color:var(--color-rota-2);}
.rota-3{border-left-color:var(--color-rota-3);}

.cidade-nome{
font-weight:800;
color:#1e272e;
font-size:14px;
}

.info-item{
font-size:13px;
color:#636e72;
display:flex;
justify-content:space-between;
}

.tag-faixas{
display:inline-block;
margin-top:8px;
background:#f1f2f6;
color:#2f3640;
padding:4px 10px;
border-radius:20px;
font-weight:bold;
font-size:12px;
}
</style>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKq1A4Yy_rlm8jHZIEWyIln1Ld5ePt3b0"></script>
</head>

<body>

<script>
var senha = prompt("Digite a senha para acessar o painel:");

if(senha !== "go@2026fra"){
document.body.innerHTML="<h2 style='font-family:Arial;text-align:center;margin-top:40px'>Acesso negado</h2>";
}
</script>

<div id="sidebar">

<div class="header-sidebar">
<h2 style="margin:0;font-size:1.4rem;">Instalações Goinfra</h2>
<p style="font-size:12px;color:#7f8c8d;">Controle de Rotas e Faixas</p>
</div>

<div class="btn-group">
<button class="btn-all" onclick="mostrarRota(0)">Ver Tudo</button>
<button class="btn1" onclick="mostrarRota(1)">Rota 1</button>
<button class="btn2" onclick="mostrarRota(2)">Rota 2</button>
<button class="btn3" onclick="mostrarRota(3)">Rota 3</button>
</div>

<div id="resumo-rota"></div>
<div id="lista"></div>

</div>

<div id="map"></div>

<script>

var mapa;
var linhas=[];
var marcadores=[];

const iconeCaminhao={
url:"https://cdn-icons-png.flaticon.com/512/1048/1048329.png",
scaledSize:new google.maps.Size(32,32)
};

const inicio={cidade:"Goiânia",lat:-16.6864,lng:-49.2643,faixas:0};

const rotas={

1:[
inicio,
{cidade:"Jaraguá",lat:-15.7561,lng:-49.3344,faixas:6},
{cidade:"Carmo do Rio Verde",lat:-15.3539,lng:-49.7083,faixas:2},
{cidade:"Ceres",lat:-15.3062,lng:-49.6003,faixas:2},
{cidade:"Itapaci",lat:-14.9518,lng:-49.5513,faixas:10},
{cidade:"Pilar de Goiás",lat:-14.7604,lng:-49.5797,faixas:2},
{cidade:"Santa Terezinha de Goiás",lat:-14.4347,lng:-49.7094,faixas:4}
],

2:[
inicio,
{cidade:"Porangatu",lat:-13.4393,lng:-49.1482,faixas:4},
{cidade:"Novo Planalto",lat:-13.2424,lng:-49.5065,faixas:2},
{cidade:"São Miguel do Araguaia",lat:-13.2750,lng:-50.1634,faixas:6},
{cidade:"Mozarlândia",lat:-14.7448,lng:-50.5707,faixas:6},
{cidade:"Crixás",lat:-14.5432,lng:-49.9696,faixas:3},
{cidade:"Alto Horizonte",lat:-14.1957,lng:-49.3379,faixas:1}
],

3:[
inicio,
{cidade:"Cidade de Goiás",lat:-15.9333,lng:-50.1403,faixas:2},
{cidade:"Santa Fé de Goiás",lat:-15.7666,lng:-49.9261,faixas:6},
{cidade:"Diorama",lat:-16.2314,lng:-51.2552,faixas:2},
{cidade:"Arenópolis",lat:-16.3860,lng:-51.0906,faixas:3},
{cidade:"Iporá",lat:-16.4411,lng:-51.1178,faixas:4},
{cidade:"Caiapônia",lat:-16.9533,lng:-51.8101,faixas:2},
{cidade:"Rio Verde",lat:-17.7923,lng:-50.9192,faixas:2},
{cidade:"Montividiu",lat:-17.4435,lng:-51.1723,faixas:2},
{cidade:"Perolândia",lat:-17.5259,lng:-52.0668,faixas:2},
{cidade:"Mineiros",lat:-17.5656,lng:-52.5536,faixas:3},
{cidade:"Chapadão do Céu",lat:-18.4074,lng:-52.5387,faixas:1},
{cidade:"Itajá",lat:-19.0674,lng:-51.5498,faixas:2},
{cidade:"São Simão",lat:-18.9968,lng:-50.5471,faixas:1}
]

};

function init(){

mapa=new google.maps.Map(document.getElementById("map"),{
zoom:7,
center:{lat:-15.8,lng:-50.5},
styles:[{featureType:"poi",stylers:[{visibility:"off"}]}]
});

}

function calcularDistancia(a,b){

const R=6371;

const dLat=(b.lat-a.lat)*Math.PI/180;
const dLng=(b.lng-a.lng)*Math.PI/180;

const aa=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(a.lat*Math.PI/180)*
Math.cos(b.lat*Math.PI/180)*
Math.sin(dLng/2)*Math.sin(dLng/2);

return R*2*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));

}

function formatarTempo(horas){

const totalMin=Math.round(horas*60);
const h=Math.floor(totalMin/60);
const m=totalMin%60;

return `${h.toString().padStart(2,"0")}h ${m.toString().padStart(2,"0")}min`;

}

function limpar(){

linhas.forEach(l=>l.setMap(null));
marcadores.forEach(m=>m.setMap(null));

linhas=[];
marcadores=[];

document.getElementById("lista").innerHTML="";
document.getElementById("resumo-rota").style.display="none";

}

function mostrarRota(n){

limpar();

const cores={1:"#045a28",2:"#d49204",3:"#1509bd"};

let totalFaixas=0;
let totalKm=0;

for(let r in rotas){

if(n!=0 && r!=n) continue;

const cidades=rotas[r];

cidades.forEach((c,i)=>{

const marker=new google.maps.Marker({
position:{lat:c.lat,lng:c.lng},
map:mapa,
title:c.cidade,
icon:iconeCaminhao
});

marcadores.push(marker);

if(i>0){

const ant=cidades[i-1];

const km=calcularDistancia(ant,c);
const tempo=formatarTempo(km/80);

totalFaixas+=c.faixas;
totalKm+=km;

const linha=new google.maps.Polyline({
path:[{lat:ant.lat,lng:ant.lng},{lat:c.lat,lng:c.lng}],
strokeColor:cores[r],
strokeWeight:4,
strokeOpacity:0.8,
map:mapa
});

linhas.push(linha);

document.getElementById("lista").innerHTML+=`
<div class="card-viagem rota-${r}">
<div class="cidade-nome">${ant.cidade} ➔ ${c.cidade}</div>
<div class="info-item"><span>Distância:</span><b>${km.toFixed(1)} km</b></div>
<div class="info-item"><span>Tempo de Estrada:</span><b>${tempo}</b></div>
<div class="tag-faixas">🛣️ ${c.faixas} faixas</div>
</div>
`;

}

});

}

if(n!=0){

const resumo=document.getElementById("resumo-rota");

resumo.style.display="block";

resumo.innerHTML=`
<strong>Resumo Rota ${n}</strong><br>
Total de Faixas: ${totalFaixas}<br>
Distância Total: ${totalKm.toFixed(1)} km
`;

}

}

google.maps.event.addDomListener(window,'load',init);

</script>

</body>
</html>
